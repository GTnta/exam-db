name: Build question images

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install PDF and image tools
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils imagemagick webp
      - name: Build images
        run: |
          node scripts/infer-pages-from-pdf-text.mjs
          node scripts/init-full-page-crops.mjs
          node scripts/build-question-images.mjs
          node scripts/check-db.mjs
      - name: Commit generated images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/images data/questions.json data/image-crops.json
          git diff --cached --quiet || git commit -m "Build question images"
          git push
